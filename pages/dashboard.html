<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Logo -->
  <link rel="icon" href="../assets/faction.png">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">

  <h2 class="logo-text">
    <img src="../assets/logo.png" class="logo-img">
    Catch <span>Fake</span>
  </h2>

  <!-- LINKS (لوحدها مش جوا nav-right) -->
  <div class="nav-links" id="nav-links">

    <div class="close-btn" id="close-btn">
      <i class="fa-solid fa-xmark"></i>
    </div>

     <a href="../index.html">Home</a>
    <a href="About.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="dashboard.html" class="active">Dashboard</a>

  </div>

  <div class="nav-right">
    <div class="user-box">
      <img id="userImg" class="user-img">
            <span id="userName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>

    </div>
  </div>

  <div class="menu-toggle" id="menu-toggle">
    <i class="fa fa-bars"></i>
  </div>

</nav>

<div class="overlay" id="overlay"></div>

<!-- DASHBOARD -->
<div class="dashboard">
  <h1 id="welcomeText">Welcome back</h1>
  <div class="cards">
    <div class="card">
      <h3>Total Media Analyzed</h3>
      <p class="number" id="totalCount">0</p>
      <span>This month</span>
    </div>

    <div class="card">
      <h3>Fake Media Detected</h3>
      <p class="number fake" id="fakeCount">0</p>
      <span>This month</span>
    </div>

    <div class="card">
      <h3>Real Media Detected</h3>
      <p class="number real" id="realCount">0</p>
      <span>This month</span>
    </div>

  </div>

  <button class="upload-btn">Upload New File</button>

  <div class="table-section">
    <h2>Recent Analysis</h2>

    <table>
      <tr>
        <th>File Name</th>
        <th>Type</th>
        <th>Result</th>
        <th>Confidence</th>
        <th>Date</th>
      </tr>

      <tr>
        <td>---</td>
        <td>---</td>
        <td><span class="badge fake">---</span></td>
        <td>
          <div class="progress">
            <div class="progress-fill" style="width: 0%;"></div>
          </div>
        </td>
        <td>---</td>
      </tr>
    </table>
  </div>
</div>
<footer>
        <p>© 2026 Catch Fake. All rights reserved.</p>
    </footer>
<!-- JS -->
<script src="../js/dashboard.js"></script>

</body>
</html>
